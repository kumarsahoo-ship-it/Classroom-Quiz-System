<!DOCTYPE html>
<html>
<head>
    <title>Create Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Create Test</h2>

<input id="testName" placeholder="Test Name"><br><br>

<!-- ⏱ TIMER -->
<h3>⏱ Set Timer</h3>

<div class="timer-box">
    <div class="time-input">
        <input id="hour" type="number" min="0" max="23" placeholder="00">
        <label>Hours</label>
    </div>

    <span>:</span>

    <div class="time-input">
        <input id="minute" type="number" min="0" max="59" placeholder="00">
        <label>Minutes</label>
    </div>

    <span>:</span>

    <div class="time-input">
        <input id="second" type="number" min="0" max="59" placeholder="00">
        <label>Seconds</label>
    </div>
</div>

<!-- QUESTIONS -->
<div id="questions"></div>

<button type="button" onclick="addQuestion()">➕ Add Question</button>
<br><br>
<button type="button" onclick="submitTest()">✅ Submit Test</button>

<script>

let count = 0;

// ================= ADD QUESTION =================
let count = 0;

function addQuestion() {

    count++;

    const container = document.getElementById("questions");

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <h3>Question ${count}</h3>

        <input id="q${count}" placeholder="Enter question"><br><br>

        <input id="q${count}o1" placeholder="Option 1"><br>
        <input id="q${count}o2" placeholder="Option 2"><br>
        <input id="q${count}o3" placeholder="Option 3"><br>
        <input id="q${count}o4" placeholder="Option 4"><br><br>

        <label>Select Correct:</label><br>

        <label><input type="radio" name="ans${count}" value="1"> 1</label>
        <label><input type="radio" name="ans${count}" value="2"> 2</label>
        <label><input type="radio" name="ans${count}" value="3"> 3</label>
        <label><input type="radio" name="ans${count}" value="4"> 4</label>

        <hr>
    `;

    container.appendChild(div);
}

// ================= SUBMIT TEST =================
function submitTest() {

    const testName = document.getElementById("testName").value.trim();

    const h = parseInt(hour.value) || 0;
    const m = parseInt(minute.value) || 0;
    const s = parseInt(second.value) || 0;

    const totalTime = h * 3600 + m * 60 + s;

    if (!testName || totalTime <= 0) {
        alert("Enter test name and valid timer");
        return;
    }

    let questions = [];

    for (let i = 1; i <= count; i++) {

        const question = document.getElementById(`q${i}`).value;

        const options = [
            document.getElementById(`q${i}o1`).value,
            document.getElementById(`q${i}o2`).value,
            document.getElementById(`q${i}o3`).value,
            document.getElementById(`q${i}o4`).value
        ];

        const selected = document.querySelector(`input[name="ans${i}"]:checked`);

        // ❌ STOP if incomplete
        if (!question || options.includes("") || !selected) {
            alert("❌ Complete all questions before submitting");
            return;
        }

        questions.push({
            question,
            options,
            answer: options[selected.value - 1]
        });
    }

    // ✅ SINGLE REQUEST ONLY
    fetch("https://classroom-test-system.onrender.com/add-questions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            testName,
            questions,
            time: totalTime
        })
    })
    .then(async res => {
        const data = await res.json();

        if (!res.ok) {
            alert("❌ " + data.message);
            return;
        }

        alert("✅ Test Created Successfully");
        window.location.href = "dashboard.html";
    })
    .catch(err => {
        console.log(err);
        alert("Server error");
    });
}

        // SEND TO BACKEND
        fetch("https://classroom-test-system.onrender.com/add-question", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                testName,
                question,
                options,
                answer,
                time: totalTime
            })
        })
        .then(res => res.text())
        .then(data => console.log(data))
        .catch(err => console.log(err));
    }

    alert("Test Created Successfully 🎉");
    window.location.href = "dashboard.html";
}

// ================= TIMER INPUT LIMIT =================
document.querySelectorAll(".time-input input").forEach(input => {
    input.addEventListener("input", () => {
        if (input.value.length > 2) {
            input.value = input.value.slice(0, 2);
        }
    });
});

</script>

</body>
</html>
