<!DOCTYPE html>
<html>
<head>
    <title>Create Test</title>
</head>
<body>

<h2>Create Test</h2>

<input id="testName" placeholder="Test Name"><br><br>

<!-- ⏱ TIMER -->
<h3>⏱ Set Timer</h3>

<div class="timer-box">
    <div class="time-input">
        <input id="hour" type="number" min="0" max="23" placeholder="00">
        <label>Hours</label>
    </div>

   <br>

<hr>

<div id="questions"></div>

<button type="button" onclick="addQuestion()">Add Question</button>
<br><br>
<button type="button" onclick="submitTest()">Submit Test</button>

<script>

let count = 0;

// ================= ADD QUESTION =================
function addQuestion() {
    count++;

    const div = document.createElement("div");

    div.innerHTML = `
        <h3>Q${count}</h3>

        <input id="q${count}" placeholder="Question"><br>

        <input id="q${count}o1" placeholder="Option 1"><br>
        <input id="q${count}o2" placeholder="Option 2"><br>
        <input id="q${count}o3" placeholder="Option 3"><br>
        <input id="q${count}o4" placeholder="Option 4"><br>

        <label><input type="radio" name="ans${count}" value="1">1</label>
        <label><input type="radio" name="ans${count}" value="2">2</label>
        <label><input type="radio" name="ans${count}" value="3">3</label>
        <label><input type="radio" name="ans${count}" value="4">4</label>

        <hr>
    `;

    document.getElementById("questions").appendChild(div);
}

// ================= SUBMIT =================
function submitTest() {

    const testName = document.getElementById("testName").value.trim();

    const h = parseInt(hour.value) || 0;
    const m = parseInt(minute.value) || 0;
    const s = parseInt(second.value) || 0;

    const totalTime = h*3600 + m*60 + s;

    if (!testName || totalTime <= 0) {
        alert("Enter test name & timer");
        return;
    }

    let questions = [];

    for (let i=1;i<=count;i++) {

        const q = document.getElementById(`q${i}`).value;

        const options = [
            document.getElementById(`q${i}o1`).value,
            document.getElementById(`q${i}o2`).value,
            document.getElementById(`q${i}o3`).value,
            document.getElementById(`q${i}o4`).value
        ];

        const selected = document.querySelector(`input[name="ans${i}"]:checked`);

        if (!q || options.includes("") || !selected) {
            alert("Complete all questions");
            return;
        }

        questions.push({
            question: q,
            options,
            answer: options[selected.value-1]
        });
    }

    // ✅ ONE CALL ONLY
    fetch("https://classroom-test-system.onrender.com/add-questions", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            testName,
            questions,
            time: totalTime
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.message === "Test already exists") {
            alert("Test name already exists");
            return;
        }

        alert("Test Created");
        window.location.href = "dashboard.html";
    })
    .catch(err => console.log(err));
}

// start with one question
addQuestion();

</script>

</body>
</html>
