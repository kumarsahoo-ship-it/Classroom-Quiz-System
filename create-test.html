<!DOCTYPE html>
<html>
<head>
    <title>Create Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Create Test (Multiple Questions)</h2>

<input id="testName" placeholder="Test Name"><br><br>
<input id="time" placeholder="Time in seconds (e.g. 60)"><br><br>

<div id="questions"></div>

<button type="button" onclick="addQuestion()">➕ Add Question</button>
<br><br>
<button type="button" onclick="submitTest()">✅ Submit Test</button>

<script>

let count = 0;

// ✅ ADD QUESTION (NO DELETE BUG)
function addQuestion() {
    count++;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <h3>Question ${count}</h3>

        <input placeholder="Enter question" id="q${count}"><br>

        <input placeholder="Option 1" id="q${count}o1">
        <input placeholder="Option 2" id="q${count}o2">
        <input placeholder="Option 3" id="q${count}o3">
        <input placeholder="Option 4" id="q${count}o4"><br><br>

        <label>Select Correct Answer:</label><br>

        <label><input type="radio" name="ans${count}" value="1"> Option 1</label>
        <label><input type="radio" name="ans${count}" value="2"> Option 2</label>
        <label><input type="radio" name="ans${count}" value="3"> Option 3</label>
        <label><input type="radio" name="ans${count}" value="4"> Option 4</label>

        <hr>
    `;

    document.getElementById("questions").appendChild(div);
}

// ✅ SUBMIT TEST
function submitTest() {

    const testName = document.getElementById("testName").value;
    const time = document.getElementById("time").value;

    if (!testName || !time) {
        alert("Enter test name and time");
        return;
    }

    for (let i = 1; i <= count; i++) {

        const question = document.getElementById(`q${i}`).value;

        const options = [
            document.getElementById(`q${i}o1`).value,
            document.getElementById(`q${i}o2`).value,
            document.getElementById(`q${i}o3`).value,
            document.getElementById(`q${i}o4`).value
        ];

        const selected = document.querySelector(`input[name="ans${i}"]:checked`);

        if (!question || options.includes("")) {
            alert("Fill all fields in question " + i);
            return;
        }

        if (!selected) {
            alert("Select correct answer for question " + i);
            return;
        }

        const answer = options[selected.value - 1];

        // ✅ SEND TO BACKEND
        fetch("https://classroom-test-system.onrender.com/add-question", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                testName,
                question,
                options,
                answer,
                time
            })
        });
    }

    alert("Test Created Successfully 🎉");

    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
