<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 Protect Dashboard -->
<script>
const user = localStorage.getItem("user");
if (!user) {
    window.location.href = "login.html";
}
</script>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Quiz System</h2>
        <ul>
            <li onclick="go('dashboard')" class="active">Dashboard</li>
            <li onclick="go('create-test')">Create Test</li>
            <li onclick="go('view-test')">View Test</li>
            <li onclick="go('results')">Results</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h1>Welcome 👋 <span id="username"></span></h1>

        <!-- CARDS -->
        <div class="cards">

            <div class="card">
                <h3>Total Tests</h3>
                <p id="totalTests">0</p>
            </div>

            <div class="card">
                <h3>Available Tests</h3>
                <p id="availableTests">0</p>
            </div>

            <div class="card">
                <h3>Your Results</h3>
                <p id="totalResults">0</p>
            </div>

        </div>

        <!-- RECENT TESTS -->
        <h2>Recent Tests</h2>

        <table id="recentTests">
            <tr>
                <th>Test Name</th>
            </tr>
        </table>

    </div>
</div>

<!-- JS -->
<script>

// 👤 Show username
document.getElementById("username").innerText = user;

// 🔄 NAVIGATION
function go(page) {
    window.location.href = page + ".html";
}

// 🚪 LOGOUT
function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

// ================= LOAD DATA =================

// TOTAL TESTS
fetch("https://classroom-test-system.onrender.com/tests")
.then(res => res.json())
.then(data => {

    // Cards update
    document.getElementById("totalTests").innerText = data.length;
    document.getElementById("availableTests").innerText = data.length;

    // Recent tests
    data.slice(0,5).forEach(test => {
        document.getElementById("recentTests").innerHTML += `
            <tr>
                <td>${test}</td>
            </tr>
        `;
    });

});

// USER RESULTS
fetch(`https://classroom-test-system.onrender.com/results/${user}`)
.then(res => res.json())
.then(data => {
    document.getElementById("totalResults").innerText = data.length;
});

</script>

</body>
</html>
