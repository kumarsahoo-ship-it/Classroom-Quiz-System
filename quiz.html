<h2 id="title"></h2>
<h3 id="timer">Time: 60</h3>

<div id="quiz"></div>
<button onclick="submitQuiz()">Submit</button>

<script>
let questions = [];
let time = 60;

const testName = localStorage.getItem("testName");
document.getElementById("title").innerText = testName;

// load questions
fetch(`https://classroom-test-system.onrender.com/questions/${testName}`)
.then(res=>res.json())
.then(data=>{
  questions = data;
  load();
});

function load(){
  questions.forEach((q,i)=>{
    quiz.innerHTML += `
      <p>${q.question}</p>
      ${q.options.map(opt=>`
        <input type="radio" name="q${i}" value="${opt}">${opt}<br>
      `).join("")}
      <hr>`;
  });
}

// TIMER
const t = setInterval(()=>{
  time--;
  timer.innerText = "Time: "+time;

  if(time==0){
    clearInterval(t);
    submitQuiz();
  }
},1000);

// SUBMIT
function submitQuiz(){
  clearInterval(t);

  let score = 0;

  questions.forEach((q,i)=>{
    const sel = document.querySelector(`input[name="q${i}"]:checked`);
    if(sel && sel.value === q.answer) score++;
  });

  const user = localStorage.getItem("user");

  fetch("https://classroom-test-system.onrender.com/result", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      username:user,
      testName:testName,
      score:score,
      total:questions.length
    })
  });

  alert(`Score: ${score}/${questions.length}`);
  window.location.href = "results.html";
}
</script>
